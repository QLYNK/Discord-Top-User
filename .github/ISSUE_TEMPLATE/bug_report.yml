name: Bug Report
description: Report a reproducible defect in bot or dashboard behavior
title: "[Bug] "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is broken?
      placeholder: Describe the issue clearly.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      placeholder: |
        1. Go to ...
        2. Run command ...
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: Environment
      description: Python version, hosting provider, and relevant runtime info
      placeholder: "Python 3.10, Render, Linux"

  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs / Tracebacks
      description: Remove secrets before submitting.
